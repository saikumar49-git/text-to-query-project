<div class="table-container mat-elevation-z0">
    <div class="table-scroll-wrapper">
        <table mat-table [dataSource]="dataSource" matSort>

            <!-- Dynamic columns generated from data keys -->
            <ng-container *ngFor="let col of displayedColumns" [matColumnDef]="col">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ formatHeader(col) }}</th>
                <td mat-cell *matCellDef="let element">
                    <span [class.badge-yes]="element[col] === true"
                          [class.badge-no]="element[col] === false"
                          [class.badge-null]="element[col] === null || element[col] === undefined">
                        {{ formatValue(element[col]) }}
                    </span>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="animate-fade-in-up"></tr>

            <!-- Row shown when there is no matching data. -->
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell empty-state" [attr.colspan]="displayedColumns.length || 1">No data available</td>
            </tr>
        </table>
    </div>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of results">
    </mat-paginator>
</div>
