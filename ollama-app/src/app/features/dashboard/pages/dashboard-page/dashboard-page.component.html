<div class="dashboard-container" *ngIf="{ results: results$ | async, isLoading: isLoading$ | async } as vm">
    <!-- Search / Chat Input Area -->
    <mat-card class="search-card">
        <mat-card-content>
            <app-search-chat [isLoading]="vm.isLoading || false" [history]="(history$ | async) || []"
                (searchSubmitted)="onSearchStarted($event)">
            </app-search-chat>
        </mat-card-content>
    </mat-card>

    <!-- SQL Query Badge -->
    <!-- <div class="sql-badge" *ngIf="!vm.isLoading && vm.results?.sqlQuery">
        <mat-icon>code</mat-icon>
        <span>{{ vm.results?.sqlQuery }}</span>
    </div> -->

    <!-- Results Area -->
    <div class="results-container" *ngIf="!vm.isLoading && vm.results && vm.results.data && vm.results.data.length > 0">
        <!-- Chart View -->
        <mat-card class="chart-card">
            <mat-card-header>
                <mat-card-title>Data Visualization</mat-card-title>
                <mat-card-subtitle>{{ vm.results.data.length }} record(s) found</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <app-results-chart [data]="vm.results.data"></app-results-chart>
            </mat-card-content>
        </mat-card>

        <!-- Table View -->
        <mat-card class="table-card">
            <mat-card-header>
                <mat-card-title>Data Details</mat-card-title>
            </mat-card-header>
            <mat-card-content>
                <app-results-table [data]="vm.results.data"></app-results-table>
            </mat-card-content>
        </mat-card>
    </div>

    <!-- Empty State when query returned no results -->
    <div class="empty-state" *ngIf="!vm.isLoading && vm.results && vm.results.data && vm.results.data.length === 0">
        <mat-icon>search_off</mat-icon>
        <p>No records found for the query.</p>
    </div>
</div>
